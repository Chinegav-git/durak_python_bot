version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: durak_postgres
    environment:
      POSTGRES_DB: durak_db
      POSTGRES_USER: chinegav
      POSTGRES_PASSWORD: 90874513067
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: durak_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
